name: Naiad Spike

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for the agent"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  spike:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Naiad CLI from tarball
        run: npm install -g ./naiad-cli-0.1.0.tgz

      - name: Run naiad exec
        env:
          NAIAD_API_KEY: ${{ secrets.NAIAD_API_KEY }}
          NAIAD_API_URL: https://v2.naiadai.com
        run: |
          naiad exec "${{ inputs.prompt }}"

      - name: Test gh issue comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_URL=$(gh issue create --title "Spike test issue" --body "Testing gh issue comment from Actions")
          echo "Created issue: $ISSUE_URL"
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          gh issue comment "$ISSUE_NUMBER" --body "🤖 Test comment from GitHub Actions workflow"
          echo "Commented on issue #$ISSUE_NUMBER"

      - name: Test gh pr create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "Naiad Spike"
          git config user.email "spike@naiadai.com"
          BRANCH="spike-test-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "spike test $(date)" > spike-test-output.txt
          git add spike-test-output.txt
          git commit -m "spike: test file"
          git push origin "$BRANCH"
          gh pr create --title "Spike test PR" --body "Testing PR creation from Actions" --head "$BRANCH" --base main
