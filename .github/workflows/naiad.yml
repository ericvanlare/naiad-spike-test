# Naiad Agent — GitHub Actions Workflow (App-dispatched)
# Copy this file to .github/workflows/naiad.yml in your repository.
#
# Prerequisites:
# 1. Install the Naiad GitHub App on this repository
# 2. Add NAIAD_API_KEY as a repository secret
#
# The Naiad App handles triggering, reactions, and result comments.
# This workflow just runs the agent.

name: Naiad Agent

on:
  workflow_dispatch:
    inputs:
      thread_id:
        description: "Naiad thread ID"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: naiad-${{ inputs.thread_id }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Naiad CLI
        run: npm install -g naiad-cli

      - name: Fetch thread prompt
        id: thread
        env:
          NAIAD_API_KEY: ${{ secrets.NAIAD_API_KEY }}
          NAIAD_API_URL: ${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}
        run: |
          THREAD=$(curl -sf "${NAIAD_API_URL}/api/v1/threads/${{ inputs.thread_id }}" \
            -H "Authorization: Bearer ${NAIAD_API_KEY}")

          echo "$THREAD" | jq -r '.prompt' > /tmp/naiad-prompt.txt
          echo "$THREAD" | jq -r '.context // "{}" ' > /tmp/naiad-context.json
          echo "$THREAD" | jq -r '.reply_target // ""' > /tmp/naiad-reply-target.json
          echo "$THREAD" | jq -r '.source // "github"' > /tmp/naiad-source.txt
          echo "$THREAD" | jq -r '.trigger // "issue_comment"' > /tmp/naiad-trigger.txt

          CONTEXT=$(cat /tmp/naiad-context.json)
          REPLY_TARGET=$(cat /tmp/naiad-reply-target.json)
          SOURCE=$(cat /tmp/naiad-source.txt)
          TRIGGER=$(cat /tmp/naiad-trigger.txt)

          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"
          echo "reply_target=$REPLY_TARGET" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "trigger=$TRIGGER" >> "$GITHUB_OUTPUT"

      - name: Run agent
        env:
          NAIAD_API_KEY: ${{ secrets.NAIAD_API_KEY }}
          NAIAD_API_URL: ${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}
        run: |
          ARGS=(
            --prompt-file /tmp/naiad-prompt.txt
            --source "${{ steps.thread.outputs.source }}"
            --trigger "${{ steps.thread.outputs.trigger }}"
            --context '${{ steps.thread.outputs.context }}'
            --output /tmp/naiad-result.json
            --thread "${{ inputs.thread_id }}"
          )

          REPLY_TARGET='${{ steps.thread.outputs.reply_target }}'
          if [ -n "$REPLY_TARGET" ] && [ "$REPLY_TARGET" != "null" ]; then
            ARGS+=(--reply-target "$REPLY_TARGET")
          fi

          naiad exec "${ARGS[@]}"

      - name: Push changes
        id: push
        if: success()
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          THREAD_ID="${{ inputs.thread_id }}"
          BRANCH="naiad/${THREAD_ID}"

          git config user.name "Naiad Agent"
          git config user.email "agent@naiadai.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "naiad: agent changes for thread $THREAD_ID"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open PR
        id: pr
        if: steps.push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          THREAD_ID="${{ inputs.thread_id }}"
          BRANCH="${{ steps.push.outputs.branch }}"
          NAIAD_API_URL="${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}"
          THREAD_URL="${NAIAD_API_URL}/app/threads/${THREAD_ID}"

          EXISTING_PR=$(gh pr view --head "$BRANCH" --json url --jq '.url' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "pr_url=$EXISTING_PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr create \
            --title "naiad: agent changes" \
            --body "Changes by Naiad agent.\n\n[View thread →](${THREAD_URL})" \
            --head "$BRANCH" \
            --base "${{ github.event.repository.default_branch }}" \
            2>/dev/null || true

          PR_URL=$(gh pr view --head "$BRANCH" --json url --jq '.url' 2>/dev/null || true)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Update thread with result
        if: always()
        env:
          NAIAD_API_KEY: ${{ secrets.NAIAD_API_KEY }}
          NAIAD_API_URL: ${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}
        run: |
          THREAD_ID="${{ inputs.thread_id }}"
          if [ -z "$THREAD_ID" ]; then exit 0; fi

          RAW_STATUS="FAILED"
          if [ -f /tmp/naiad-result.json ]; then
            RAW_STATUS=$(jq -r '.status // "FAILED"' /tmp/naiad-result.json)
          fi
          if [ "$RAW_STATUS" != "COMPLETED" ]; then RAW_STATUS="FAILED"; fi

          RESULT=$(jq -n \
            --arg status "$RAW_STATUS" \
            --arg pr_url "${{ steps.pr.outputs.pr_url }}" \
            --arg branch "${{ steps.push.outputs.branch }}" \
            '{status: $status, pr_url: (if $pr_url != "" then $pr_url else null end), branch: (if $branch != "" then $branch else null end)}')

          curl -sf -X PATCH "${NAIAD_API_URL}/api/v1/threads/${THREAD_ID}" \
            -H "Authorization: Bearer ${NAIAD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"${RAW_STATUS}\", \"result\": ${RESULT}}" || true
